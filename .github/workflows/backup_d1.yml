name: Daily Backup - D1 to Google Sheet

on:
  schedule:
    # 每天北京时间凌晨 2:00 运行 (UTC时间 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backup-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run Backup Script
      env:
        # Google Sheets Config
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_BACKUP_ID: ${{ secrets.GOOGLE_SHEET_BACKUP_ID }}
        # Cloudflare D1 Config
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        TZ: 'Asia/Shanghai'
      run: |
        uv run python scripts/backup_d1_to_sheet.py
