name: 每日发布数据统计报告

on:
  schedule:
    # 每天北京时间 20:00 运行 (UTC时间 12:00)
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run Daily Report Script
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        FEISHU_WEBHOOK_URL: "https://open.feishu.cn/open-apis/bot/v2/hook/009c15b4-fb99-4eaa-82a7-f1a190083bfc"
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_BASE_ID: ${{ secrets.FEISHU_BASE_ID }}
        FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        TZ: 'Asia/Shanghai'
      run: |
        uv run python scripts/daily_report.py
