name: Step2 - AI 文章生成

on:
  schedule:
    # 工业级极速引擎：滞后 Step 1 十五分钟，每 3 小时准时清空队列
    - cron: '15 */3 * * *'
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  step2-article:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        category: ["专业知识", "行业资讯", "产品介绍"]
      fail-fast: false
    concurrency:
      group: step2-article-${{ matrix.category }}
      cancel-in-progress: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run Step2 - AI 文章生成 (${{ matrix.category }})
      env:
        ARTICLE_CATEGORY: ${{ matrix.category }}
        # 使用国内 DeepSeek 直连 API
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_BASE_ID: ${{ secrets.FEISHU_BASE_ID }}
        FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        # Google Sheets Config
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        TZ: 'Asia/Shanghai'
      run: |
        uv run python -m step2_article.agent_runner
