name: Step3 - RPA 发布到 WellCMS

on:
  schedule:
    # 北京时间 全天 24 小时每 30 分钟执行
    - cron: '0,30 * * * *'
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  step3-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # 30分钟超时 (单分类15篇/次，每篇约1分钟)
    strategy:
      matrix:
        category: ["专业知识", "行业资讯", "产品介绍"]
      fail-fast: false           # 某个分类失败不影响其他分类
    concurrency:
      group: step3-${{ matrix.category }}
      cancel-in-progress: false  # 跳过新任务，不取消正在运行的
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Install Playwright browsers
      run: |
        # 重建 apt-mirrors.txt 并写入官方源，解决 Ubuntu 24.04 镜像解析报错
        sudo mkdir -p /etc/apt
        echo "http://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
        sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
        sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list 2>/dev/null || true
        sudo timeout 60s apt-get update || true
        uv run playwright install chromium --with-deps

    - name: Run Step3 - RPA 发布 (${{ matrix.category }})
      env:
        # 并行模式: 每个 Job 独占一个分类，每次发布 15 篇
        PUBLISH_CATEGORY: ${{ matrix.category }}
        MAX_PUBLISH_TOTAL: "15"
        MAX_PUBLISH_PER_CATEGORY: "15"
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_BASE_ID: ${{ secrets.FEISHU_BASE_ID }}
        FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        WELLCMS_USERNAME: ${{ secrets.WELLCMS_USERNAME }}
        WELLCMS_PASSWORD: ${{ secrets.WELLCMS_PASSWORD }}
        WELLCMS_LOGIN_URL: "https://heyijiapack.com/news/user-login.html"
        WELLCMS_ADMIN_URL: "https://heyijiapack.com/news/admin/index.php"
        WELLCMS_POST_URL: "https://heyijiapack.com/news/admin/index.php?0=content&1=create&fid=0"
        FEISHU_WEBHOOK_URL: "https://open.feishu.cn/open-apis/bot/v2/hook/009c15b4-fb99-4eaa-82a7-f1a190083bfc"
        PUBLISH_CONFIG_JSON: ${{ secrets.PUBLISH_CONFIG_JSON }}
        # Google Sheets Config
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_SHEET_BACKUP_ID: ${{ secrets.GOOGLE_SHEET_BACKUP_ID }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        # Image API Keys
        POLLINATIONS_API_KEYS: ${{ secrets.POLLINATIONS_API_KEYS }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        TZ: 'Asia/Shanghai'
      run: |
        uv run python -m step3_publish.agent_runner
