name: Step0 - 多引擎并发聚合爬虫

on:
  schedule:
    # 每 4 小时执行一次，一天 6 次，配合代码里的分段洗牌逻辑彻底避免搜素引擎封禁
    - cron: '0 */4 * * *'
  workflow_dispatch:  # 允许在 Actions 页面手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  step0-scraper:
    runs-on: ubuntu-latest
    concurrency:
      group: step0-scraper
      cancel-in-progress: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run Step0 - 多引擎并发聚合爬虫
      env:
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        CF_D1_PACKAGING_DB_ID: ${{ secrets.CF_D1_PACKAGING_DB_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        TZ: 'Asia/Shanghai'
      run: |
        uv run python -m step0_scraper.spider
