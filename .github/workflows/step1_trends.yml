name: Step1 - 热词搜索与标题生成

on:
  schedule:
    # 工业级极速引擎：已提速至每15分钟自动搜索与处理词库，配合 Step2 实现全双工不间断运转
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  step1-trends:
    runs-on: ubuntu-latest
    concurrency:
      group: step1-trends
      cancel-in-progress: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run Step1 - 热词搜索与标题生成
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        # MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_BASE_ID: ${{ secrets.FEISHU_BASE_ID }}
        # Google Sheets Config
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_SHEET_BACKUP_ID: ${{ secrets.GOOGLE_SHEET_BACKUP_ID }}
        CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        CF_D1_PACKAGING_DB_ID: ${{ secrets.CF_D1_PACKAGING_DB_ID }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        TZ: 'Asia/Shanghai'
      run: |
        uv run python -m step1_trends.agent_runner
